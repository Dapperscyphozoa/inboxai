<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InboxAI - Executive Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --navy: #0a1628;
            --navy-light: #152238;
            --navy-lighter: #1f2f47;
            --gold: #d4af37;
            --gold-dim: #b8962e;
            --white: #ffffff;
            --off-white: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --shadow-premium: 0 20px 60px rgba(0,0,0,0.12);
            --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lighter) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 50px 60px;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(212,175,55,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dim), var(--gold));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -1px;
            color: var(--navy);
            margin-bottom: 12px;
        }
        
        .header-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .settings-link {
            position: absolute;
            top: 50px;
            right: 60px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 12px 24px;
            border-radius: 8px;
            background: rgba(212,175,55,0.08);
        }
        
        .settings-link:hover {
            background: rgba(212,175,55,0.15);
            transform: translateY(-2px);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 50px 60px;
            border-radius: 24px;
            margin: 30px 0;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(212,175,55,0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            transform: translateY(-4px);
        }
        
        .card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 400;
            color: var(--navy);
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            color: var(--navy);
            padding: 18px 48px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(212,175,55,0.25);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(212,175,55,0.35);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .email-item {
            padding: 32px;
            margin: 16px 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212,175,55,0.12);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .email-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--gold);
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .email-item:hover::before {
            transform: scaleY(1);
        }
        
        .email-item:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.6) 100%);
            transform: translateX(8px);
            box-shadow: var(--shadow-elevated);
        }
        
        .email-item.priority {
            border-left: 4px solid var(--gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(212,175,55,0.04) 100%);
        }
        
        .email-from {
            font-weight: 600;
            font-size: 18px;
            color: var(--navy);
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        
        .email-subject {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .email-preview {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        
        .priority-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            color: var(--navy);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            padding: 60px;
            border-radius: 32px;
            max-width: 1000px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 120px rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.15);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-content h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 400;
            color: var(--navy);
            margin-bottom: 16px;
        }
        
        .response {
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(248,249,250,0.6) 100%);
            backdrop-filter: blur(10px);
            padding: 32px;
            margin: 20px 0;
            border-radius: 20px;
            border: 2px solid rgba(212,175,55,0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .response:hover,
        .response.selected {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.08) 0%, rgba(212,175,55,0.04) 100%);
            transform: translateX(8px);
            box-shadow: var(--shadow-elevated);
        }
        
        .response strong {
            display: block;
            color: var(--gold);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 80px 40px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212,175,55,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .edit-btn {
            background: rgba(255,255,255,0.9);
            color: var(--navy);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 10px 20px;
            margin-top: 16px;
            font-size: 13px;
            box-shadow: none;
        }
        
        .edit-btn:hover {
            background: rgba(255,255,255,1);
            border-color: var(--gold);
        }
        
        textarea {
            width: 100%;
            padding: 20px;
            border: 2px solid rgba(212,175,55,0.3);
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.7;
            min-height: 180px;
            resize: vertical;
            background: rgba(255,255,255,0.9);
            transition: all 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
        }
        
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .header, .card { padding: 30px; }
            .header h1 { font-size: 36px; }
            .modal-content { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/settings.html" class="settings-link">⚙ Configure</a>
            <h1>Executive Suite</h1>
            <p class="header-subtitle" id="userStatus">AI-Powered Communication Intelligence</p>
        </div>

        <div id="connectSection" class="card">
            <h2>Authenticate</h2>
            <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 16px;">Securely connect your Gmail account to begin</p>
            <button class="btn" onclick="connectGmail()">Connect Gmail</button>
        </div>

        <div id="emailSection" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <h2 style="margin: 0;">Communications</h2>
                    <button class="btn" onclick="loadEmails()" style="padding: 14px 32px; font-size: 14px;">Refresh</button>
                </div>
                <div id="emailList"></div>
            </div>
        </div>

        <div id="loadingSection" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="color: var(--off-white); font-size: 16px;">Processing...</p>
        </div>
    </div>

    <div id="responseModal" class="modal">
        <div class="modal-content">
            <h2 id="modalSubject"></h2>
            <p id="modalFrom" style="color: var(--text-secondary); margin-bottom: 30px; font-size: 15px;"></p>
            <hr style="border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent); margin: 30px 0;">
            <div id="modalBody" style="margin: 30px 0; white-space: pre-wrap; line-height: 1.8; color: var(--text-primary);"></div>
            <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--navy); margin: 40px 0 24px;">Generated Responses</h3>
            <div id="modalResponses"></div>
            <div style="margin-top: 50px; display: flex; gap: 16px; justify-content: flex-end;">
                <button class="btn" style="background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,249,250,0.9)); color: var(--navy); box-shadow: none; border: 1px solid rgba(0,0,0,0.1);" onclick="closeModal()">Cancel</button>
                <button class="btn" onclick="sendEmail()">Send Response</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '916330711384-a6uuvana6u051hvja5lk4h95gudspb4d.apps.googleusercontent.com';
        const REDIRECT_URI = 'https://inbox-ai-beige.vercel.app/dashboard.html';
        const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send';

        let accessToken = localStorage.getItem('gmail_access_token');
        let currentEmails = [];
        let selectedEmail = null;
        let selectedResponse = null;

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                document.getElementById('loadingSection').style.display = 'block';
                
                try {
                    const response = await fetch('/api/oauth/google', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    
                    const data = await response.json();
                    
                    if (data.access_token) {
                        accessToken = data.access_token;
                        localStorage.setItem('gmail_access_token', accessToken);
                        window.history.replaceState({}, document.title, '/dashboard.html');
                        
                        document.getElementById('loadingSection').style.display = 'none';
                        document.getElementById('connectSection').style.display = 'none';
                        document.getElementById('emailSection').style.display = 'block';
                        loadEmails();
                    } else {
                        throw new Error(data.error || 'Authentication failed');
                    }
                } catch (error) {
                    document.getElementById('loadingSection').style.display = 'none';
                    alert('Authentication error: ' + error.message);
                }
            } else if (accessToken) {
                document.getElementById('connectSection').style.display = 'none';
                document.getElementById('emailSection').style.display = 'block';
                loadEmails();
            }
        };

        function connectGmail() {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${CLIENT_ID}&` +
                `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                `response_type=code&` +
                `scope=${encodeURIComponent(SCOPES)}&` +
                `access_type=offline&` +
                `prompt=consent`;
            
            window.location.href = authUrl;
        }

        async function loadEmails() {
            if (!accessToken) {
                connectGmail();
                return;
            }

            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('emailList').innerHTML = '';

            try {
                const customInstructions = localStorage.getItem('inboxai_instructions') || '';
                const openInstructions = localStorage.getItem('inboxai_open_instructions') || '';
                const signature = localStorage.getItem('inboxai_signature') || '';
                const responseCount = localStorage.getItem('inboxai_response_count') || '6';
                const customStyles = localStorage.getItem('inboxai_custom_styles') || '';

                const response = await fetch('/api/fetch-emails', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        accessToken,
                        tonePreference: 'professional',
                        userStyle: {
                            custom: customInstructions,
                            openInstructions: openInstructions,
                            signature: signature,
                            responseCount: responseCount,
                            customStyles: customStyles
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    if (data.error.includes('invalid') || data.error.includes('expired')) {
                        localStorage.removeItem('gmail_access_token');
                        connectGmail();
                        return;
                    }
                    throw new Error(data.error);
                }

                currentEmails = data.emails || [];
                document.getElementById('loadingSection').style.display = 'none';
                displayEmails();

                const priorityEmails = currentEmails.filter(e => e.priority);
                if (priorityEmails.length > 0) {
                    showPriorityAlert(priorityEmails.length);
                }
            } catch (error) {
                document.getElementById('loadingSection').style.display = 'none';
                alert('Error loading emails: ' + error.message);
            }
        }

        function showPriorityAlert(count) {
            if (Notification.permission === 'granted') {
                new Notification('InboxAI - Priority Communication', {
                    body: `${count} urgent message${count > 1 ? 's' : ''} requiring immediate attention`
                });
            }
        }

        function displayEmails() {
            const container = document.getElementById('emailList');
            
            if (currentEmails.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 60px 0; font-size: 16px;">No pending communications</p>';
                return;
            }

            const sorted = [...currentEmails].sort((a, b) => (b.priority ? 1 : 0) - (a.priority ? 1 : 0));

            sorted.forEach(email => {
                const div = document.createElement('div');
                div.className = 'email-item' + (email.priority ? ' priority' : '');
                div.onclick = () => openEmail(email);
                div.innerHTML = `
                    ${email.priority ? '<div class="priority-badge">⚡ Urgent</div>' : ''}
                    <div class="email-from">${email.from}</div>
                    <div class="email-subject">${email.subject}</div>
                    <div class="email-preview">${email.body.substring(0, 180)}...</div>
                `;
                container.appendChild(div);
            });
        }

        function openEmail(email) {
            selectedEmail = email;
            document.getElementById('modalSubject').textContent = email.subject;
            document.getElementById('modalFrom').textContent = 'From: ' + email.from;
            document.getElementById('modalBody').textContent = email.body;

            const responsesDiv = document.getElementById('modalResponses');
            responsesDiv.innerHTML = '';

            if (!email.aiResponses || email.aiResponses.length === 0) {
                responsesDiv.innerHTML = '<p>No responses available</p>';
            } else {
                email.aiResponses.forEach((resp, i) => {
                    const div = document.createElement('div');
                    div.className = 'response' + (i === 0 ? ' selected' : '');
                    div.onclick = () => selectResponse(div, resp, i);
                    div.innerHTML = `
                        <strong>${resp.label}</strong>
                        <div style="white-space: pre-wrap; line-height: 1.7; color: var(--text-primary);" id="response-text-${i}">${resp.text}</div>
                        <button class="btn edit-btn" onclick="editResponse(${i}); event.stopPropagation();">Edit Response</button>
                    `;
                    responsesDiv.appendChild(div);
                });
                selectedResponse = email.aiResponses[0];
            }

            document.getElementById('responseModal').classList.add('active');
        }

        function selectResponse(element, response, index) {
            document.querySelectorAll('.response').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedResponse = response;
        }

        function editResponse(index) {
            const textDiv = document.getElementById(`response-text-${index}`);
            const currentText = textDiv.textContent;
            
            const textarea = document.createElement('textarea');
            textarea.value = currentText;
            
            textDiv.replaceWith(textarea);
            textarea.focus();
            
            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn';
            saveBtn.style.cssText = 'margin-top: 16px; padding: 12px 24px; font-size: 14px;';
            saveBtn.textContent = 'Save Changes';
            saveBtn.onclick = (e) => {
                e.stopPropagation();
                const newText = textarea.value;
                selectedEmail.aiResponses[index].text = newText;
                
                const newDiv = document.createElement('div');
                newDiv.style.cssText = 'white-space: pre-wrap; line-height: 1.7; color: var(--text-primary);';
                newDiv.id = `response-text-${index}`;
                newDiv.textContent = newText;
                
                textarea.replaceWith(newDiv);
                saveBtn.remove();
                
                const responseDiv = document.querySelectorAll('.response')[index];
                if (responseDiv.classList.contains('selected')) {
                    selectedResponse = selectedEmail.aiResponses[index];
                }
            };
            
            textarea.after(saveBtn);
        }

        async function sendEmail() {
            if (!selectedEmail || !selectedResponse) {
                alert('Please select a response');
                return;
            }

            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accessToken,
                        to: selectedEmail.from,
                        subject: selectedEmail.subject,
                        body: selectedResponse.text,
                        threadId: selectedEmail.threadId
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('Message sent successfully');
                    closeModal();
                    loadEmails();
                } else {
                    throw new Error(data.error || 'Send failed');
                }
            } catch (error) {
                alert('Send error: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('responseModal').classList.remove('active');
        }

        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
